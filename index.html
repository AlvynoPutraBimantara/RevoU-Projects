<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .highlight {
            color: red;
            font-weight: bold;
        }
        .blue-text {
            color: blue;
        }
    </style>
</head>

<body>
    <h1>Header 1</h1>
    <p>Paragraph 1</p>
    <p>Paragraph <span class="highlight">2</span></p>
    <hr/>
    <p>Paragraph 3 <br> 
    <span class="blue-text">Paragraph 4</span></p>
    <h2>Header 2</h2>
    <h3>Header 3</h3>
    <h4>Header 4</h4>
    <hr/>
    <p>
       Line to test <b><span class="highlight">bold</span></b> element.<br>
       Line to test <i><span class="blue-text">italic</span></i> element.<br>
       Line to test <sub><span class="highlight">Upper text</span></sub> element.<br>
       Line to test <sup><span class="blue-text">Lower text</span></sup> element.<br>
    </p>
</body>
</html>
