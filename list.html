<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document2</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-600 to-white min-h-screen flex items-center justify-center">

    <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md">
        
        <h1 class="text-2xl font-bold mb-4 text-center">Unordered List</h1>
        <ul class="list-square pl-6 text-lg space-y-1">
            <li>Keyboard</li>
            <li>Laptop</li>
            <li>Mouse</li>
            <li>Speaker</li>
            <li>Headset</li>
        </ul>

        <hr class="my-6">

        <h1 class="text-2xl font-bold mb-4 text-center">Ordered List</h1>
        <ol class="list-[upper-alpha] pl-6 text lg space-y-1">
            <li>Keyboard</li>
            <li>Mouse</li>
            <li>Speaker</li>
            <li>Laptop</li>
            <li>Headset</li>
        </ol>

    </div>

</body>
</html>
